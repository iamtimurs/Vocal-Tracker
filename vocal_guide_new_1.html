                solution: "Сделайте трель губами, расслабьте их, проговорите фразу в речевой форме, примените в исполнении"
            },

            // ЯРКОСТЬ (Brightness)
            {
                number: 17,
                title: "Отсутствие яркости звука",
                category: "brightness",
                emoji: "✨",
                problem: "Отсутствие яркости, звонкости или назальной окраски звука",
                reason: "Опущенное мягкое нёбо",
                necessary: "Вам необходим назализированный в разных пропорциях звук. Ярический, звонкий, пронзительный, при этом легкий.",
                solution: "Поднимите мягкое нёбо, создав купол в глотке, позевав"
            },

            // ВЫСОТА (Height)
            {
                number: 18,
                title: "Чрезмерно завышенная гортань",
                category: "height",
                emoji: "🎼",
                problem: "Чрезмерно завышенная гортань",
                reason: "Чрезмерно завышенная гортань",
                necessary: "Вам необходимы легкие, чистые и удобные верхние ноты в любом голосовом качестве и любой громкости, плотности и яркости.",
                solution: "Позовите кого-нибудь на 'Эй' или 'Эгегей', примените ощущение в исполнении"
            },
            {
                number: 19,
                title: "Тяжесть на высоких звуках в диапазоне",
                category: "height",
                emoji: "🎼",
                problem: "Тяжесть на высоких звуках, 'грязь' в интонировании верхнего диапазона",
                reason: "Заниженная гортань",
                necessary: "Вам необходимы легкие, чистые и удобные верхние ноты в любом голосовом качестве и любой громкости, плотности и яркости.",
                solution: "Приплакните или порыдайте на фразе, следите за гортанью (не опускайте ее)"
            },

            // ТЕМБР (Timbre)
            {
                number: 20,
                title: "Слишком 'металлический' звук",
                category: "timbre",
                emoji: "🎵",
                problem: "Слишком 'металлический' звук при необходимой тонкости",
                reason: "Толщина смыкания",
                necessary: "Вам необходим мягкий, нежный и тонкий звук, зачастую тихий, в тихом музыкальном фрагменте",
                solution: "Спойте сложный отрезок более детским голосом"
            }
        ];

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const problemsContainer = document.getElementById('problemsContainer');
        const counter = document.getElementById('counter');

        let currentFilter = 'all';

        // Initialize app
        function init() {
            renderProblems();
            attachEventListeners();
        }

        // Fuzzy search function
        function fuzzyMatch(text, pattern) {
            if (!pattern) return true;
            
            const patternLower = pattern.toLowerCase();
            const textLower = text.toLowerCase();
            
            // Direct substring match (highest priority)
            if (textLower.includes(patternLower)) return true;
            
            // Fuzzy character match
            let patternIdx = 0;
            for (let i = 0; i < textLower.length && patternIdx < patternLower.length; i++) {
                if (textLower[i] === patternLower[patternIdx]) {
                    patternIdx++;
                }
            }
            return patternIdx === patternLower.length;
        }

        // Render problems grouped by category
        function renderProblems() {
            problemsContainer.innerHTML = '';
            const categories = [
                { key: 'loudness', title: 'Громкость', emoji: '📢' },
                { key: 'density', title: 'Плотность', emoji: '🎯' },
                { key: 'comfort', title: 'Удобство', emoji: '🛟' },
                { key: 'beauty', title: 'Красота', emoji: '🌟' },
                { key: 'brightness', title: 'Яркость', emoji: '✨' },
                { key: 'height', title: 'Высота', emoji: '🎼' },
                { key: 'timbre', title: 'Тембр', emoji: '🎵' }
            ];

            let totalVisible = 0;

            categories.forEach(cat => {
                const categoryProblems = problems.filter(p => 
                    (currentFilter === 'all' || p.category === currentFilter) &&
                    fuzzyMatch(p.problem + ' ' + p.reason + ' ' + p.solution + ' ' + p.title, searchInput.value)
                );

                if (categoryProblems.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'category-section active';

                    const title = document.createElement('div');
                    title.className = 'category-title';
                    title.innerHTML = `<span class="category-emoji">${cat.emoji}</span> ${cat.title}`;

                    const grid = document.createElement('div');
                    grid.className = 'problems-grid';

                    categoryProblems.forEach(problem => {
                        const card = createProblemCard(problem);
                        grid.appendChild(card);
                        totalVisible++;
                    });

                    section.appendChild(title);
                    section.appendChild(grid);
                    problemsContainer.appendChild(section);
                }
            });

            counter.textContent = totalVisible;
        }

        // Create problem card
        function createProblemCard(problem) {
            const card = document.createElement('div');
            card.className = 'problem-card visible';

            card.innerHTML = `
                <div class="problem-number">${problem.number}</div>
                <div class="problem-title">${problem.title}</div>

                <div class="problem-item">
                    <label class="problem-label">💬 Симптомы / Проблема</label>
                    <div class="problem-text">${problem.problem}</div>
                </div>

                <div class="problem-item">
                    <label class="problem-label">🔍 Причина</label>
                    <div class="problem-text">${problem.reason}</div>
                </div>

                <div class="problem-item">
                    <label class="problem-label">🎯 Что нам необходимо</label>
                    <div class="problem-text">${problem.necessary}</div>
                </div>

                <button class="expand-btn" onclick="toggleExpanded(this)">
                    Показать решение ▼
                </button>

                <div class="expanded-content">
                    <div class="problem-item">
                        <label class="problem-label">✅ Вариант решения</label>
                        <div class="problem-text">${problem.solution}</div>
                    </div>
                </div>
            `;

            return card;
        }

        // Toggle expanded content
        window.toggleExpanded = function(btn) {
            const expanded = btn.nextElementSibling;
            expanded.classList.toggle('show');
            btn.textContent = expanded.classList.contains('show') 
                ? 'Скрыть решение ▲' 
                : 'Показать решение ▼';
        };

        // Event listeners
        function attachEventListeners() {
            // Search
            searchInput.addEventListener('input', (e) => {
                renderProblems();
            });

            // Filters
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderProblems();
                });
            });
        }

        // Start
        init();
    </script>
</body>
</html>
